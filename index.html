"},E={mmsDisplay:"'Zilla Slab', 'Rockwell', serif",mmsBody:"'Source Sans 3', 'Helvetica Neue', sans-serif",bd:"'Helvetica Neue', Helvetica, Arial, sans-serif"},ku=[{id:"evoke",label:"EVOKE",color:b.evoke,desc:"The feelings M&M'S unlocks in fan moments"},{id:"express",label:"EXPRESS",color:b.express,desc:"How fans externalize their M&M'S relationship"},{id:"connect",label:"CONNECT",color:b.connect,desc:"How M&M'S facilitate human bonds"}],la=[{num:1,chapter:"evoke",color:b.evoke,title:"The more things change, the more things stay the same.",body:"It's not that M&M'S doesn't meet the moment, it's that they're always timeless. Even on-trend flavors still have that classic M&M'S feel. They're the ever-reliable candy that always delivers the experience you know and love.",quotes:[{text:"The packets haven't changed and that makes it perfect \u2014 never change the packets!",name:"Alexandra E."},{text:"They are the trusty reliable sidekick! They will always be there for me and make me feel good\u2026",name:"Dylan N."},{text:"M&M'S always show up when I need them the most. They are the most loyal friend who will never abandon you.",name:"Kara E."},{text:"When I grab a bag of M&M'S, I know exactly what to expect. A very delicious treat.",name:"Shari S."}],showsUp:"To fans, M&M'S feel like home \u2014 they turn to them to seek comfort in the familiarity, and trust that they'll always be satisfied."},{num:2,chapter:"evoke",color:b.evoke,title:"M&M'S are the 'Saturday morning cartoons' of candy.",body:"Some things just hit different when you're a kid. But M&M'S? They still hit the same. The taste appeal lasts, and emotionally, the fondness only grows stronger. Fans remain fans for life.",quotes:[{text:"A lot of things don't hit the same in adulthood as in childhood, but M&M'S do\u2026 It's both a kids snack and an adult snack.",name:"Maggie W."},{text:"Now I eat them more for the memories than for the actual candies.",name:"Mikayla S."},{text:"When I walked into the store, I felt like a kid again\u2026 comparable to Kevin in Home Alone visiting Duncan's Toy Chest.",name:"Sabria B."},{text:"It's M&M'S not Skittles \u2014 too sweet. There's a balance of chocolate in M&M'S. I don't get sick of them.",name:"Daniel R."}],showsUp:"Fans remain fans for life \u2014 functionally, the taste appeal lasts, and emotionally, the fondness only grows stronger."},{num:3,chapter:"evoke",color:b.evoke,title:"In case of emergency, reach for the bag of M&M'S at the bottom of your purse.",body:"Whether it's a rough day, a boring meeting, or just that 3pm slump \u2014 M&M'S are the emotional regulation tool hiding in plain sight.",quotes:[{text:"It helps me when I am stressed. It picks me up and makes me happy to eat it.",name:"Andrea S."},{text:"I reach for a bag of M&M'S because I feel that if I have M&M'S with me then I can do whatever.",name:"Eva T."},{text:"They are my go-to mood \u2026 I feel uplifted when I reach for the bag and savour the taste.",name:"Tracy M."},{text:"Whether I need to keep my spirit up, or while watching a movie, or some streaming content...",name:"Henry L."}],showsUp:"No matter the starting point, M&M'S leave fans' moods better than before."},{num:4,chapter:"evoke",color:b.evoke,title:"M&M'S aren't just a treat for your tastebuds, all five senses are invited to this party!",body:"The crunch. The colors. The rattle in the bag. Fans don't just eat M&M'S \u2014 they experience them with every sense.",quotes:[{text:"An amazing sensory experience\u2026 the clattering noise, the vibrant array of colours, the smell of the nutty chocolate\u2026",name:"Tracy M."},{text:"The salty peanut butter with the hit of sweetness\u2026 Felt like I just been fed after starving out in the wilderness.",name:"Scott F."},{text:"They make my life easier. It's not hard to tear open a bag and pour them in a bowl\u2026plus they make that great sound when you do :-)",name:"Sheri G."},{text:"I first think about the different colors of M&M'S, the blues and reds and yellows. When I was little, I used to love sorting these.",name:"Maggie W."}],showsUp:"Fans don't just eat M&M'S, they savor and experience them."},{num:5,chapter:"evoke",color:b.evoke,title:`Whoever said "you shouldn't play with your food" surely wasn't talking about M&M'S.`,body:"Sorting by color. Building pyramids. Eating in a specific order. M&M'S invite play and ritual.",quotes:[{text:"I usually eat them one at a home, usually by colors \u2014 blues first, then oranges, then reds, then yellows, greens, etc.",name:"Maggie W."},{text:"I pour out a package and arrange them in a pyramid\u2026 I eat one from each row\u2026 getting rid of the ugly colors first.",name:"Patricia M."},{text:"When I was younger, I played softball... we always ate M&M'S at games. It was extremely good luck to eat a green M&M'S before batting.",name:"Amy W."},{text:"You can separate colors and play games or you can just eat them.",name:"Gregory L."}],showsUp:"Fans of all ages count, sort, arrange, and assign meaning to M&M'S."},{num:6,chapter:"express",color:b.express,title:"The M&M'S characters are YOUniversal \u2014 everybody knows an Orange.",body:"You might be a sociable Green, a confident Red, or an anxious Orange \u2014 whatever your flavor, it's easy to see a little of you in the M&M'S characters.",quotes:[{text:"The M&M'S characters are amazing\u2026 It brings nostalgia from when I was a kid and also an appreciation for good design.",name:"Apostolos S."},{text:"They put a smile on my face\u2026. My daughter loves going to the M&M'S store with me and collecting her favorite characters too.",name:"Joanne B."},{text:"\u2026 each serves a purpose. The Yellow M&M'S is funny and good-natured, and the Green M&M'S is sassy.",name:"Jessica A."},{text:"I grew up seeing red and yellow characters on TV, so, when I think of M&M'S those two silly guys are the first image I see.",name:"Renee G."}],showsUp:"Fans delight in the spokes candies, identifying with their personalities and finding friends in every color."},{num:7,chapter:"express",color:b.express,title:"M&M'S are always the perfect lil sumpin' sumpin'.",body:"No one doesn't like M&M'S. That takes the guesswork out of gift-giving. With M&M'S, you literally can't go wrong.",quotes:[{text:"Every year I gift my husband M&M'S with his face on it and it is the best thing ever.",name:"Vivian S."},{text:"When my mom turned 50, we ordered a bunch in the different shades of purple for her Birthday party...",name:"Christina R."},{text:"I'd save up all year just to get her whatever new characters came out\u2026 She would never treat herself, so, I did it for her.",name:"Christina R."},{text:"You know how hard it is to give a really good gift in a corporate place?",name:"Dan R."}],showsUp:"Fans reach for M&M'S for all their gifting needs \u2014 reducing the mental load of nailing the moment."},{num:8,chapter:"express",color:b.express,title:"For only containing two little letters, M&M'S sure have a way of saying a whole lot.",body:`From "can I sit here" to "remember when" \u2014 M&M'S help give 'voice' to endless individual expressions.`,quotes:[{text:"I ordered some custom M&M'S that said #1 Team on them, in our company colors. They loved it.",name:"Ben M."},{text:"It's like, 'custom M&M'S badge unlocked'...It's a thing now.",name:"Dan R."},{text:"There was a special screening of the Princess Bride, the movie that brought us together, so, I order M&M'S with quotes from the movie for her.",name:"Scott F."},{text:"I have a group of friends that we share snacks. When we find a new flavor, we share it with our group.",name:"Todd S."}],showsUp:"Personalization lets fans reinforce bonds and signal belonging to a community."},{num:9,chapter:"connect",color:b.connect,title:"Chocolate chips make cookies; M&M'S make traditions.",body:"M&M'S are the simple, special touch that helps turn recipes into rituals \u2014 M&M'S can turn any moment into a memory.",quotes:[{text:"Whenever I make cookies\u2026 for my best friend, I will only put one or two M&M'S in them\u2026 Whoever gets an M&M'S will plan a day of whatever they like.",name:"Eva T."},{text:"We use M&M'S minis every Christmas in our cookies and fudge. That's a tradition since we were married.",name:"Javier R."},{text:"Night owl\u2026 When all my work for the day is done\u2026 I settle down on the couch. Just me myself and my M&M'S...",name:"Shari S."},{text:"My friend's family has autistic individuals in it\u2026 I ship them M&M'S candies like 6 times a year.",name:"Joanne B."}],showsUp:"Fans make M&M'S their own, and while no two traditions are the same, none would be complete without M&M'S."},{num:10,chapter:"connect",color:b.connect,title:"You've got a smartphone. They had a rotary phone. But you've both held the same bag of M&M'S in your hands.",body:"There aren't many experiences that different generations truly share. But M&M'S are an exception. That's a bond that bridges past, present, and future.",quotes:[{text:"I named my daughter Emma & my dad brought a bag of plain M&M'S to the hospital\u2026 Twenty-two years later they are still a snack we all enjoy!",name:"Sarah M."},{text:"My Grandma used them all the time in baking. We would bake together and she would teach me everything.",name:"Jennifer L."},{text:"I love to get M&M'S on Halloween. It reminds me of going trick or treating with my kids when they were young.",name:"Sharon R."},{text:"I think of a snowman platter my grandmother had out every holiday season...",name:"Mikayla S."}],showsUp:"Fans often stem from long lineages, with love for M&M'S running in the family."},{num:11,chapter:"connect",color:b.connect,title:"There's no I in M&M'S. But there is an Us.",body:`Whether it's carefully curated colors that signal "these are my people", or a personalized batch that brings an inside joke to life \u2014 M&M'S and human connection go hand-in-hand.`,quotes:[{text:"I ordered some custom M&M'S that said #1 Team on them, in our company colors. They loved it.",name:"Be What makes a good Fan Truth? Three qualities: Specific (not generic platitudes \u2014 real, observed behavior), Shared (not one person's quirk, but a pattern across fans), and Special (brand-shaped \u2014 it couldn't be said about just any candy).`},{id:"why",title:"Why Anchor in Fan Truths?",content:`M&M'S wants owned retail to be the heart of the brand. To make that a reality, we needed to uncover and explore how deep brand meaning can connect to retail experiences. And to do that, we needed to cross-provoke with people who are most likely to thread that needle: M&M'S Fans.

Fan Truths give us a strategic bridge between what the brand means emotionally and how those emotions can be activated in owned retail environments (stores and e-commerce).`},{id:"how",title:"How Did We Develop Them?",content:`We conducted a multi-wave ethnographic study using the Aha! digital ethnography platform across two consumer segments:

\u2022 In-Store Consumers (n=15, 2 waves): Universal M&M'S likers who visited a flagship store (NYC, Las Vegas, Disney Springs, or London) within the past 2 weeks.

\u2022 DCom Consumers (n=15, 2 waves): Mars\u2013M&M'S dot-com purchasers in the past 60 days. Distributed across priority usage occasions including everyday gifting, birthdays, weddings, baby showers, and seasonal/holiday occasions.

\u2022 IDIs (n=6): 30-minute 1-on-1 interviews with "superstars" from the ethnographic research.

Timing: Wave 1 ran December 16\u201318, 2025 and Wave 2 ran January 14\u201316, 2026, with IDIs on January 21.`},{id:"process",title:"From Research to Truths",content:`The process moved from raw ethnographic data to refined Fan Truths through several stages:

1. Digital Ethnography: Participants completed 3 days of activities including photo/video diaries, guided reflections, and prompted storytelling.

2. Quote Mining & Pattern Recognition: Researchers identified recurring emotional and behavioral patterns across participants.

3. "Why" Laddering: For each pattern, we asked "why does this matter?" multiple times to get beneath the surface.

4. Truth Crafting: Patterns were distilled into provocative, memorable truth statements in fan-forward language.

5. Validation via IDIs: Six standout participants were re-engaged for 1-on-1 interviews to pressure-test the truths.

6. Chapter Organization: Truths were organized into three chapters (Evoke, Express, Connect).`},{id:"action",title:"How Do Fan Truths Translate to Action?",content:`Fan Truths aren't just insights \u2014 they're creative fuel. McDonald's demonstrated this powerfully when they leveraged the Fan Truth "No matter how famous you are, everybody has a go-to McDonald's order" to create their massively successful Famous Orders campaign.

For M&M'S, each Fan Truth is paired with strategic prompts for owned retail activation. The engagement model invites stakeholders to ideate against the truths using the prompt: "What does this make us want to Start, Stop, Continue, or Dig Into?"`},{id:"bluedog",title:"About Bluedog",content:`Bluedog is a strategy and innovation consultancy. We create clarity so you can act with conviction. We partner with organizations to define and deliver a clear path to growth.

Our practice areas span Insight, Strategy, Innovation, Brand, and Design. Bluedog's Insights Studio designs bespoke learning plans from a curated roster of over 250 vetted research technologies and methodologies, custom-designed to match each unique business challenge.

The Fan Truths methodology is part of Bluedog's Insights practice \u2014 translating qualitative consumer research into brand-actionable strategic territories. This study was conducted for Mars Wrigley Confectionery (M&M'S) in partnership with the Aha! digital ethnography platform.

Bluedog is a woman-owned, B Corp certified company based in Chicago, IL.
